  clw.appendChild(clsel);
  const sjw=mk('div');sjw.innerHTML='<label style="font-size:11px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">Subject *</label>';
  const sjsel=mk('select',{id:'uf-subj',class:'inp',style:'padding:9px 10px;font-size:13px'});
  function updateSjOpts(){sjsel.innerHTML='';(SUBJECTS[selCls2]||[]).forEach(s=>{const o=mk('option');o.value=s;o.textContent=s;if(s===selSubj2)o.selected=true;sjsel.appendChild(o);});}
  sjsel.onchange=e=>{selSubj2=e.target.value;updateChOpts();};
  updateSjOpts(); sjw.appendChild(sjsel);
  meta.append(clw,sjw); w.appendChild(meta);

  const chw=mk('div',{style:'margin-bottom:11px'});chw.innerHTML='<label style="font-size:11px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">Chapter</label>';
  const chsel=mk('select',{id:'uf-ch',class:'inp',style:'padding:9px 10px;font-size:13px'});
  function updateChOpts(){chsel.innerHTML='<option value="">-- Chapter chunein --</option>';getChaps(selCls2,selSubj2).forEach(c=>{const o=mk('option');o.value=c;o.textContent=c;if(c===selChap2)o.selected=true;chsel.appendChild(o);});}
  updateChOpts(); chw.appendChild(chsel); w.appendChild(chw);

  // TITLE & DESC
  [{l:'Title *',id:'uf-title',ph:'e.g. Polynomials Complete Notes',val:m?.title},{l:'Topic / Subtitle',id:'uf-topic',ph:'e.g. Zeroes of Polynomial (optional)',val:m?.topic}].forEach(f=>{
    const fw=mk('div',{style:'margin-bottom:11px'});fw.innerHTML=`<label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">${f.l}</label>`;
    const i=mk('input',{id:f.id,class:'inp',placeholder:f.ph,value:f.val||''});fw.appendChild(i);w.appendChild(fw);
  });

  // DESCRIPTION
  const dw=mk('div',{style:'margin-bottom:11px'});dw.innerHTML='<label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">Description</label>';
  const dtxt=mk('textarea',{id:'uf-desc',class:'inp',rows:'2',placeholder:'Short description (optional)'});if(m?.desc)dtxt.textContent=m.desc;
  dw.appendChild(dtxt);w.appendChild(dw);

  // URL
  const uw=mk('div',{style:'margin-bottom:11px'});
  uw.innerHTML='<label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">🔗 URL / Link *</label><div style="font-size:11px;color:var(--sub);margin-bottom:6px">PDF ka Google Drive link, YouTube video link, image link, etc.</div>';
  const uinp=mk('input',{id:'uf-url',class:'inp',placeholder:'https://drive.google.com/... ya YouTube link',value:(m?.url&&m.url!=='#')?m.url:''});
  uw.appendChild(uinp);w.appendChild(uw);

  // FILE UPLOAD NOTE
  const fn=mk('div',{style:'background:var(--acc)12;border:1px solid var(--acc)25;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--sub)'});
  fn.innerHTML=`<b style="color:var(--acc)">💡 File Upload Tips:</b><br>• PDF/Book: Google Drive "Share" → "Anyone with link" → link copy karein<br>• Video: YouTube link ya Google Drive video link<br>• Image: Imgur ya Google Drive image link`;
  w.appendChild(fn);

  const te=mk('div',{style:'margin-bottom:14px'});te.innerHTML='<label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">Thumbnail Emoji (optional)</label>';
  const tiinp=mk('input',{id:'uf-thumb',class:'inp',style:'font-size:20px;padding:9px 12px',placeholder:'e.g. 📐 🔬 📖',value:m?.thumb||''});
  te.appendChild(tiinp);w.appendChild(te);

  // QUIZ SECTION
  const qsec=mk('div',{id:'uf-qsec',style:`display:${selType==='quiz'?'block':'none'};margin-bottom:16px`});

  function refreshQList(){
    const ql=qsec.querySelector('#q-list');ql.innerHTML='';
    quizQs.forEach((q,i)=>{
      const qc=mk('div',{style:'background:var(--card2);border-radius:11px;padding:11px 12px;border:1px solid var(--border)'});
      qc.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px">Q${i+1}. ${q.q}</div>${q.opts.map((o,oi)=>`<div style="font-size:11px;color:${oi===q.ans?'var(--green)':'var(--sub)'}">${oi===q.ans?'✅':'○'} ${o}</div>`).join('')}</div><button onclick="quizQs.splice(${i},1);refreshQList()" style="background:var(--red)18;border:none;color:var(--red);border-radius:7px;padding:4px 8px;cursor:pointer;font-size:11px;font-family:inherit;flex-shrink:0">✕</button></div>`;
      ql.appendChild(qc);
    });
  }
  const aqb=mk('button',{style:'width:100%;padding:11px;border-radius:11px;background:var(--yellow)15;border:1.5px dashed var(--yellow);color:var(--yellow);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit'});
  aqb.textContent='➕ Question Add Karo';
  aqb.onclick=()=>{
    const shbg=mk('div',{class:'sheet-bg'});shbg.onclick=()=>shbg.remove();
    const sh=mk('div',{class:'sheet'});sh.onclick=e=>e.stopPropagation();
    let cans=0;
    sh.innerHTML=`<div class="shdl"></div><div style="font-weight:800;font-size:16px;color:var(--text);margin-bottom:14px">➕ New Question</div>
    <label style="font-size:12px;color:var(--sub);display:block;margin-bottom:5px;font-weight:700">Question *</label>
    <textarea id="nq-q" class="inp" rows="2" placeholder="Question text..." style="margin-bottom:12px"></textarea>
    <div id="nq-opts"></div>
    <div style="font-size:11px;color:var(--green);padding:8px 11px;background:var(--green)12;border-radius:9px;margin:10px 0">💡 Sahi answer ke button par click karein (woh green ho jayega)</div>`;
    const od=sh.querySelector('#nq-opts'); const ois=[];
    ['A','B','C','D'].forEach((l,i)=>{
      const row=mk('div',{style:'display:flex;gap:8px;align-items:center;margin-bottom:8px'});
      const rb=mk('button',{id:`nr-${i}`,style:`width:30px;height:30px;border-radius:50%;border:2px solid ${i===0?'var(--green)':'var(--border)'};background:${i===0?'var(--green)':'transparent'};color:${i===0?'#fff':'var(--sub)'};font-weight:800;font-size:11px;cursor:pointer;flex-shrink:0;font-family:inherit`});
      rb.textContent=l;
      rb.onclick=()=>{ cans=i;['A','B','C','D'].forEach((_,j)=>{const r=sh.querySelector(`#nr-${j}`);r.style.borderColor=j===i?'var(--green)':'var(--border)';r.style.background=j===i?'var(--green)':'transparent';r.style.color=j===i?'#fff':'var(--sub)';}); };
      const oi=mk('input',{class:'inp',style:'flex:1;padding:9px 11px;font-size:13px',placeholder:`Option ${l}...`});
      ois.push(oi); row.append(rb,oi); od.appendChild(row);
    });
    const svq=mk('button',{class:'btn btn-green',style:'margin-top:6px'});svq.textContent='✅ Save Question';

      const opts=ois.map(x=>x.value.trim());
      if(opts.some(x=>!x)){toast('Sab 4 options bharna zaroori!','err');return;}
      quizQs.push({q:q2,opts,ans:cans}); refreshQList(); shbg.remove(); toast('Question add ho gaya!');

    sh.appendChild(svq);shbg.appendChild(sh);document.getElementById('root').appendChild(shbg);
  };
  qsec.appendChild(aqb); refreshQList();
  function refreshQuizSec(){ if(qsec) qsec.style.display=selType==='quiz'?'block':'none'; }

  // SUBMIT
  const sb=mk('button',{class:m?'btn btn-acc':'btn btn-green'});sb.textContent=m?'💾 Changes Save Karo':'🚀 Material Add Karo';

    const title=document.getElementById('uf-title')?.value?.trim();
    const cls2=document.getElementById('uf-cls')?.value;
    const subj2=document.getElementById('uf-subj')?.value;
    const chap2=document.getElementById('uf-ch')?.value||'';
    const desc2=document.getElementById('uf-desc')?.value?.trim()||'';
    const url2=document.getElementById('uf-url')?.value?.trim()||'#';
    const thumb2=document.getElementById('uf-thumb')?.value?.trim()||TYPE_INFO[selType]?.icon||'📄';
    const topic2=document.getElementById('uf-topic')?.value?.trim()||'';
    if(!title){ toast('Title zaroori hai!','err'); return; }
    if(!subj2){ toast('Subject chunein!','err'); return; }
    if(selType==='quiz'&&quizQs.length===0){ toast('Kam se kam 1 question add karo!','err'); return; }
    const item={
      id: m?m.id:'mat_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      title, type:selType, cls:cls2, subject:subj2, chapter:chap2, topic:topic2,
      desc:desc2, url:url2, thumb:thumb2,
      views:m?m.views:0,
      date:m?m.date:new Date().toISOString().split('T')[0],
      ...(selType==='quiz'?{questions:quizQs}:{})

    if(m){ const idx=MATS.findIndex(x=>x.id===m.id); if(idx>=0) MATS[idx]=item; }
    else MATS.unshift(item);

    S.adEditId=null; S.adForm=null; S.adTab='content';
    rebuildAdBody(); updateAdTabs();
    toast(m?'Material update ho gaya! ✅':'Material add ho gaya! 🚀');
  };
  w.appendChild(sb);
  return w;
}

// ─── CHAPTERS MANAGER ────────────────────────────────────
function adChapters(){
  const w=mk('div');

  const tr=mk('div',{style:'display:flex;gap:8px;margin-bottom:12px'});
  tr.innerHTML='<div style="font-weight:900;font-size:15px;color:var(--text);width:100%;margin-bottom:4px">📑 Chapter Manager</div>';
  const clsel=mk('select',{class:'inp',style:'padding:9px 10px;font-size:12px;flex:1'});
  ['9','10'].forEach(c=>{const o=mk('option');o.value=c;o.textContent='Class '+c;if(c===S.adChCls)o.selected=true;clsel.appendChild(o);});
  clsel.onchange=e=>{S.adChCls=e.target.value;refreshSjOpts2();renderChapters();};
  const sjsel=mk('select',{class:'inp',style:'padding:9px 10px;font-size:12px;flex:1'});
  function refreshSjOpts2(){sjsel.innerHTML='';(SUBJECTS[S.adChCls]||[]).forEach(s=>{const o=mk('option');o.value=s;o.textContent=s;if(s===S.adChSubj)o.selected=true;sjsel.appendChild(o);});}
  sjsel.onchange=e=>{S.adChSubj=e.target.value;renderChapters();};
  refreshSjOpts2(); tr.append(clsel,sjsel); w.appendChild(tr);

  const cw=mk('div',{id:'ch-wrap'});w.appendChild(cw);

  function renderChapters(){
    cw.innerHTML='';
    const key=`${S.adChCls}_${S.adChSubj}`;
    if(!CHAPTERS[key]) CHAPTERS[key]=[];
    const chs=CHAPTERS[key];

    const info=d('margin-bottom:10px');info.innerHTML=`<span style="font-size:12px;color:var(--sub)">${chs.length} chapters • Class ${S.adChCls} ${S.adChSubj}</span>`;
    cw.appendChild(info);

    const ar=mk('div',{style:'display:flex;gap:8px;margin-bottom:12px'});
    const ci=mk('input',{class:'inp',style:'flex:1;padding:10px 12px;font-size:13px',placeholder:'Naya chapter naam...'});
    const ab=mk('button',{class:'btn btn-green btn-sm',style:'white-space:nowrap;flex-shrink:0'});ab.textContent='＋ Add';
    ab.onclick=()=>{
      const v=ci.value.trim();
      if(!v){toast('Chapter naam daalo!','err');return;}
      if(chs.includes(v)){toast('Yeh chapter already hai!','warn');return;}
      chs.push(v); ci.value=''; svChapters(); renderChapters(); toast('Chapter add ho gaya!');
    };
    ci.addEventListener('keydown',e=>{if(e.key==='Enter')ab.click();});
    ar.append(ci,ab); cw.appendChild(ar);

    if(chs.length===0){
      const e=d('text-align:center;padding:24px;background:var(--card2);border-radius:12px;border:1px dashed var(--border);color:var(--sub)');
      e.innerHTML='<div style="font-size:32px">📑</div><div style="margin-top:6px;font-size:12px">Koi chapter nahi. Add karein!</div>';
      cw.appendChild(e); return;
    }

    const ll=d('display:flex;flex-direction:column;gap:7px');
    chs.forEach((ch,i)=>{
      const mats=getMats({cls:S.adChCls,subj:S.adChSubj,chapter:ch});
      const row=mk('div',{style:'background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:9px'});
      row.innerHTML=`<div style="width:28px;height:28px;border-radius:8px;background:var(--acc)20;display:flex;align-items:center;justify-content:center;color:var(--acc);font-weight:800;font-size:11px;flex-shrink:0">${i+1}</div>
      <div style="flex:1;overflow:hidden"><div style="font-weight:600;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ch}</div>
      <div style="font-size:10px;color:var(--sub)">${mats.length} materials</div></div>`;
      // Move up/down
      if(i>0){const up=mk('button',{style:'background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:4px 8px;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text)'});up.textContent='↑';up.onclick=()=>{[chs[i],chs[i-1]]=[chs[i-1],chs[i]];svChapters();renderChapters();};row.appendChild(up);}
      if(i<chs.length-1){const dn=mk('button',{style:'background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:4px 8px;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text)'});dn.textContent='↓';dn.onclick=()=>{[chs[i],chs[i+1]]=[chs[i+1],chs[i]];svChapters();renderChapters();};row.appendChild(dn);}
      const del=mk('button',{style:'background:var(--red)15;border:none;color:var(--red);border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit'});del.textContent='✕';
      del.onclick=()=>{if(confirm(`"${ch}" delete karein?`)){chs.splice(i,1);svChapters();renderChapters();toast('Chapter delete ho gaya!');}};
      row.appendChild(del); ll.appendChild(row);
    });

  }
  draw();
  return w;
}

// ─── ANALYTICS ───────────────────────────────────────────
function adAnalytics(){

  [...MATS].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,8).forEach((m,i)=>{

    const row=mk('div',{style:'display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px'});
    row.innerHTML=`<span style="font-size:14px;font-weight:900;color:var(--sub);width:18px">${i+1}</span>

    <div style="flex:1;overflow:hidden"><div style="font-weight:600;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.title}</div>
    <div class="prog" style="margin-top:4px"><div style="width:${pct}%;background:var(--acc)"></div></div></div>
    <span style="font-size:11px;color:var(--acc);font-weight:700">👁 ${m.views||0}</span>`;
    tv.appendChild(row);
  });
  w.appendChild(tv);

  // By subject
  const bst=d('margin-bottom:8px');bst.innerHTML='<div style="font-weight:700;font-size:13px;color:var(--text);margin-bottom:9px">📚 By Subject</div>';
  w.appendChild(bst);
  const subjCnts={};MATS.forEach(m=>subjCnts[m.subject]=(subjCnts[m.subject]||0)+1);
  const maxS=Math.max(...Object.values(subjCnts),1);
  const bs=mk('div',{class:'card',style:'margin-bottom:16px'});
  Object.entries(subjCnts).sort((a,b)=>b[1]-a[1]).forEach(([s,n])=>{
    const col=SUBJ_COLOR[s]||'#6c63ff';
    const row=d('display:flex;align-items:center;gap:9px;margin-bottom:9px');
    row.innerHTML=`<span style="font-size:12px;font-weight:600;color:var(--text);width:75px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s}</span><div class="prog" style="flex:1"><div style="width:${Math.round((n/maxS)*100)}%;background:${col}"></div></div><span style="font-size:12px;color:${col};font-weight:700;width:18px;text-align:right">${n}</span>`;
    bs.appendChild(row);
  });
  w.appendChild(bs);

  // By class
  const bct=d('margin-bottom:8px');bct.innerHTML='<div style="font-weight:700;font-size:13px;color:var(--text);margin-bottom:9px">🎓 By Class</div>';
  w.appendChild(bct);
  const bc=mk('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:9px'});
  ['9','10'].forEach(cls=>{
    const n=MATS.filter(m=>m.cls===cls).length;
    const col=CLASS_COL[cls]||'#666';
    const c=mk('div',{style:`background:var(--card);border:1px solid ${col}30;border-radius:12px;padding:12px 6px;text-align:center`});
    c.innerHTML=`<div style="font-weight:900;font-size:19px;color:${col}">${n}</div><div style="font-size:9px;color:var(--sub)">Class ${cls}</div>`;
    bc.appendChild(c);
  });
  w.appendChild(bc);
  return w;
}

            ${isActiveToday?'<span style="background:var(--green)22;color:var(--green);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700">● Active</span>':''}
            <div style="font-size:9px;color:var(--sub);max-width:80px;word-break:break-all;text-align:right">ID: ${stu.id.slice(-8)}</div>
          </div>
        </div>
        <div style="display:flex;gap:6px;margin-top:10px;border-top:1px solid var(--border);padding-top:9px">
          <button onclick="removeStudent('${stu.id}')" style="flex:1;padding:7px;border-radius:9px;background:var(--red)15;border:1px solid var(--red)30;color:var(--red);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">🚫 Remove</button>
        </div>`;
        ll.appendChild(row);
      });
      w.appendChild(ll);
    }

    // Removed students
    if(removed.length>0){
      const rt=d('margin-top:16px');
      rt.innerHTML=`<div style="font-weight:700;font-size:13px;color:var(--sub);margin-bottom:8px">🚫 Removed Students (${removed.length})</div>`;
      removed.forEach(stu=>{
        const row=mk('div',{style:'background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;opacity:.6'});
        row.innerHTML=`<div style="flex:1"><div style="font-weight:600;font-size:12px;color:var(--sub)">${stu.name} • ${stu.phone}</div></div>`;
        const restoreBtn=mk('button',{style:'background:var(--green)18;border:1px solid var(--green)33;color:var(--green);border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit'});
        restoreBtn.textContent='Restore';
        restoreBtn.onclick=()=>{
          const idx=STUDENTS.findIndex(s=>s.id===stu.id);
          if(idx>=0){STUDENTS[idx].active=true;svStudents();draw();toast(`${stu.name} restore ho gaya!`);}
        };
        row.appendChild(restoreBtn);rt.appendChild(row);
      });
      w.appendChild(rt);
    }
  }

  window.removeStudent=function(id){
    if(!confirm('Is student ko remove karein? Woh dobara login nahi kar payega jab tak restore na karein.'))return;
    const idx=STUDENTS.findIndex(s=>s.id===id);
    if(idx>=0){
      const name=STUDENTS[idx].name;
      STUDENTS[idx].active=false;svStudents();draw();toast(`${name} remove ho gaya!`);
    }
  };

  draw();
  return w;
}

// ─── SETTINGS ────────────────────────────────────────────
function adSettings(){
  const w=mk('div');
  w.innerHTML=`<div style="font-weight:900;font-size:15px;color:var(--text);margin-bottom:16px">⚙️ Settings</div>`;

  // ── CHANGE CREDENTIALS ──
  const cc=mk('div',{class:'card',style:'margin-bottom:14px'});
  cc.innerHTML=`
  <div style="display:flex;align-items:center;gap:9px;margin-bottom:14px">
    <div style="width:36px;height:36px;border-radius:10px;background:var(--red)20;display:flex;align-items:center;justify-content:center;font-size:18px">🔐</div>
    <div><div style="font-weight:800;font-size:14px;color:var(--text)">Login Credentials</div><div style="font-size:11px;color:var(--sub);margin-top:1px">Email aur password change karein</div></div>
  </div>
  <div style="background:var(--card2);border-radius:10px;padding:10px 12px;margin-bottom:14px">
    <div style="font-size:11px;color:var(--sub);font-weight:600">Current Email</div>
    <div style="font-size:14px;color:var(--text);font-weight:700;margin-top:2px" id="cur-email">${CREDS.email}</div>
  </div>
  <div style="margin-bottom:10px"><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">📧 Naya Email</label>
    <input id="new-email" class="inp" type="email" value="${CREDS.email}" placeholder="nayi@email.com"></div>
  <div style="margin-bottom:10px"><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">🔑 Current Password (confirm karein)</label>
    <div style="position:relative"><input id="cur-p" class="inp" type="password" placeholder="Current password..." style="padding-right:44px">
    <button type="button" onclick="const i=document.getElementById('cur-p');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--sub)">👁</button></div></div>
  <div style="margin-bottom:10px"><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">🔑 Naya Password</label>
    <div style="position:relative"><input id="new-p" class="inp" type="password" placeholder="Naya password (min 6 chars)..." style="padding-right:44px">
    <button type="button" onclick="const i=document.getElementById('new-p');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--sub)">👁</button></div></div>
  <div style="margin-bottom:16px"><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700">🔑 Confirm Naya Password</label>
    <input id="conf-p" class="inp" type="password" placeholder="Password dobara likhein..."></div>`;

  const sv=mk('button',{class:'btn btn-red'});sv.textContent='🔐 Credentials Update Karo';
  sv.onclick=()=>{
    const cp=document.getElementById('cur-p')?.value;
    const ne=document.getElementById('new-email')?.value?.trim();
    const np=document.getElementById('new-p')?.value;
    const cfp=document.getElementById('conf-p')?.value;
    if(!cp){toast('Current password confirm karein!','err');return;}
    if(cp!==CREDS.password){toast('Current password galat hai!','err');return;}
    if(!ne){toast('Email daalna zaroori hai!','err');return;}
    if(np&&np.length<6){toast('Password kam se kam 6 characters ka hona chahiye!','err');return;}
    if(np&&np!==cfp){toast('Passwords match nahi kar rahe!','err');return;}
    CREDS.email=ne;
    if(np) CREDS.password=np;
    svCreds();
    const cem=document.getElementById('cur-email');if(cem)cem.textContent=CREDS.email;
    const adEmail=document.getElementById('ad-email');if(adEmail)adEmail.textContent=CREDS.email;
    document.getElementById('cur-p').value='';document.getElementById('new-p').value='';document.getElementById('conf-p').value='';
    toast('Credentials save ho gaye! ✅ Agla login naye password se karein');
  };
  cc.appendChild(sv);w.appendChild(cc);

  // ── DATA MANAGEMENT ──
  const dm=mk('div',{class:'card',style:'margin-bottom:14px'});
  dm.innerHTML=`<div style="font-weight:800;font-size:14px;color:var(--text);margin-bottom:12px">💾 Data</div>
  <div style="font-size:13px;color:var(--sub);margin-bottom:12px">Sab materials aur chapters <b style="color:var(--green)">permanently</b> localStorage mein save hain. Browser data clear karne se hi hatenge.</div>
  <div style="background:var(--card2);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:12px;color:var(--text);font-weight:700">Materials saved:</div><div style="font-size:18px;font-weight:900;color:var(--acc)">${MATS.length}</div></div>
    <div style="text-align:right"><div style="font-size:12px;color:var(--text);font-weight:700">Chapters saved:</div><div style="font-size:18px;font-weight:900;color:var(--green)">${Object.values(CHAPTERS).reduce((s,c)=>s+c.length,0)}</div></div>
  </div>`;
  w.appendChild(dm);

  // ── DANGER ZONE ──
  const dz=mk('div',{style:'background:var(--red)10;border:1px solid var(--red)25;border-radius:14px;padding:14px'});
  dz.innerHTML='<div style="font-weight:800;font-size:13px;color:var(--red);margin-bottom:10px">⚠️ Danger Zone</div>';
  const delAll=mk('button',{style:'width:100%;padding:11px;border-radius:11px;background:transparent;border:1.5px solid var(--red)55;color:var(--red);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:8px'});
  delAll.textContent='🗑️ Sab Materials Delete Karo';
  delAll.onclick=()=>{ if(confirm('SURE? Sab materials permanently delete ho jayenge! Yeh action undo nahi ho sakta!')){ MATS=[]; svMats(); toast('Sab materials delete ho gaye!'); rebuildAdBody(); } };
  dz.appendChild(delAll);
  const logout=mk('button',{style:'width:100%;padding:11px;border-radius:11px;background:transparent;border:1.5px solid var(--border);color:var(--sub);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit'});
  logout.textContent='🚪 Admin Logout';
  logout.onclick=()=>{ if(confirm('Admin logout karein?')){ go({view:'main',nav:'home'}); } };
  dz.appendChild(logout);
  w.appendChild(dz);
  return w;
}

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════
// Update last seen on every app open
updateStudentLastSeen();

// If not logged in → show login screen, else go home
if(!CUR_STUDENT){
  showStudentLogin();
} else {
  S.cls = CUR_STUDENT.cls || '10';
  S.studyCls = CUR_STUDENT.cls || '10';
  render();
}
</script>
