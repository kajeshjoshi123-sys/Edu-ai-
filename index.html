<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>EduAI – Study Materials</title><link rel="manifest" href="/Edu-ai-/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090f;--bg2:#111118;--card:#14141f;--card2:#1c1c2a;
  --border:#252535;--text:#e8e8ff;--sub:#6868a0;
  --acc:#6c63ff;--acc2:#845ef7;
  --green:#00d68f;--red:#ff5252;--orange:#ff922b;--yellow:#ffd43b;--cyan:#22d3ee;--pink:#f472b6;
}
[data-light]{--bg:#f0f2ff;--bg2:#e4e8ff;--card:#fff;--card2:#f4f6ff;--border:#dde0f0;--text:#1a1a3a;--sub:#5858a0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text)}
#root{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}

/* PAGES */
.pg{position:absolute;inset:0;bottom:66px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pg::-webkit-scrollbar{display:none}
.pg-full{bottom:0}

/* BOTTOM NAV */
#bnav{position:absolute;bottom:0;left:0;right:0;height:66px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:50;padding:0 6px;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:5px 2px;min-width:40px;color:var(--sub);font-family:inherit}
.nb .ni{width:38px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;transition:all .2s}
.nb .nl{font-size:9px;font-weight:600;transition:color .2s}
.nb.on .ni{background:var(--acc)22}
.nb.on .nl{color:var(--acc);font-weight:800}

/* ADMIN CIRCLE BUTTON */
.admin-circle{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#ff5252,#c20000);border:3px solid #ff525244;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;box-shadow:0 4px 14px #ff525444;transition:all .2s;margin-top:-10px;flex-shrink:0}
.admin-circle:active{transform:scale(.93)}

/* COMPONENTS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.inp{display:block;width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:11px;color:var(--text);padding:12px 14px;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}
textarea.inp{resize:none}
select.inp{cursor:pointer}
select.inp option{background:var(--card)}
.btn{display:block;width:100%;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:14px;padding:13px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-acc{background:linear-gradient(135deg,var(--acc),var(--acc2))}
.btn-red{background:linear-gradient(135deg,var(--red),#990000)}
.btn-green{background:linear-gradient(135deg,var(--green),#009960)}
.btn-orange{background:linear-gradient(135deg,var(--orange),#cc6600)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:9px;width:auto;display:inline-block}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text)}

/* HEADER */
.ghdr{background:linear-gradient(135deg,#0d0520,#0a1040);padding:16px 16px 20px;border-bottom-left-radius:22px;border-bottom-right-radius:22px;border-bottom:1px solid var(--border)}

/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.type-pdf{background:#ff525218;color:#ff5252;border:1px solid #ff525230}
.type-video{background:#6c63ff18;color:#6c63ff;border:1px solid #6c63ff30}
.type-image{background:#00d68f18;color:#00d68f;border:1px solid #00d68f30}
.type-quiz{background:#ffd43b18;color:#aa8800;border:1px solid #ffd43b30}
.type-note{background:#22d3ee18;color:#22d3ee;border:1px solid #22d3ee30}
.type-pyq{background:#f472b618;color:#f472b6;border:1px solid #f472b630}
.type-book{background:#ff922b18;color:#ff922b;border:1px solid #ff922b30}

/* SEARCH */
.srch{position:relative}
.srch input{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px 11px 40px;font-size:13px;outline:none;width:100%;font-family:inherit}
.srch input:focus{border-color:var(--acc)}
.srch .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}

/* PROGRESS */
.prog{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.prog div{height:100%;border-radius:99px;transition:width .4s}

/* MODAL / SHEET */
.sheet-bg{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);display:flex;flex-direction:column;justify-content:flex-end}
.sheet{background:var(--card);border-top-left-radius:24px;border-top-right-radius:24px;max-height:92vh;overflow-y:auto;padding:8px 16px 32px;scrollbar-width:none}
.sheet::-webkit-scrollbar{display:none}
.shdl{width:38px;height:4px;background:var(--border);border-radius:99px;margin:10px auto 16px}

/* FULLSCREEN OVERLAY */
.ov{position:fixed;inset:0;z-index:4000;background:var(--bg);overflow-y:auto;scrollbar-width:none}
.ov::-webkit-scrollbar{display:none}

/* ADMIN SIDEBAR LAYOUT */
.ad-wrap{display:flex;flex:1;overflow:hidden;height:calc(100dvh - 58px)}
.ad-sidebar{width:70px;background:linear-gradient(180deg,#120008,#18000e,#100010);border-right:1px solid rgba(255,82,82,.12);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;flex-shrink:0;overflow-y:auto;scrollbar-width:none}
.ad-sidebar::-webkit-scrollbar{display:none}
.ad-tab{width:58px;padding:9px 4px;border:1px solid transparent;border-radius:12px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;background:transparent}
.ad-tab .tic{font-size:20px;line-height:1}
.ad-tab .tl{font-size:8px;font-weight:600;color:rgba(255,255,255,.3);text-align:center;line-height:1.3;word-break:break-word}
.ad-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ad-content::-webkit-scrollbar{display:none}
.ad-body{padding:14px 13px 60px}

/* QUIZ */
.qopt{width:100%;padding:12px 15px;border-radius:12px;border:2px solid var(--border);background:var(--card2);color:var(--text);font-size:14px;font-weight:600;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px;font-family:inherit;transition:all .2s}
.qopt.correct{border-color:var(--green)!important;background:#00d68f18;color:var(--green)}
.qopt.wrong{border-color:var(--red)!important;background:#ff525218;color:var(--red)}

/* ANIMATIONS */
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .22s ease forwards}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slideup{animation:slideup .28s ease forwards}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite}

/* TOAST */
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(10px);padding:10px 18px;border-radius:22px;font-weight:700;font-size:13px;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CHIP */
.chip{display:inline-flex;align-items:center;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--card2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}

/* MAT CARD */
.mc{display:flex;gap:11px;align-items:flex-start;padding:13px;border-radius:14px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.mc:active{transform:scale(.98);border-color:var(--acc)55}
.mico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

*{scrollbar-width:none}

/* CALCULATOR */
.calc-btn{height:58px;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;border:none;transition:.08s;user-select:none;font-family:inherit;-webkit-user-select:none}
.calc-btn:active{transform:scale(.9);opacity:.8}
.cb-n{background:var(--card);color:var(--text)}
.cb-o{background:#2a285a;color:#6c63ff;font-size:20px}
.cb-e{background:linear-gradient(135deg,#6c63ff,#845ef7);color:#fff;box-shadow:0 3px 12px #6c63ff44}
.cb-f{background:#102030;color:#22d3ee;font-size:13px}
.cb-c{background:#3a1212;color:#ff5252}
.cb-g{background:var(--card2);color:var(--sub)}

/* CALENDAR */
.cal-day{height:40px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:13px;font-weight:600;position:relative}
.cal-day.today{background:var(--acc);color:#fff;font-weight:900}
.cal-day.has-event::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--orange)}
.cal-day.today.has-event::after{background:#fff}
.cal-day.festival{color:var(--yellow);font-weight:700}
.cal-day.sunday{color:var(--red)}
.cal-day.selected{background:var(--acc)33;border:1.5px solid var(--acc);color:var(--acc);font-weight:800}
.cal-day:hover:not(.today){background:var(--card2)}
.event-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* TODO */
.todo-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:8px;transition:all .2s}
.todo-item.done{opacity:.55}
.todo-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.todo-check.done{background:var(--green);border-color:var(--green)}

/* NOTIFICATION BELL */
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--bg)}

/* TOOL TABS */
.tool-tab{flex:1;padding:9px 0;border:none;background:transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s}
.tool-tab .ti{font-size:19px}
.tool-tab .tl{font-size:9px;font-weight:600;color:var(--sub)}
.tool-tab.on .tl{color:var(--acc);font-weight:800}
.tool-tab.on .ti-wrap{background:var(--acc)22;border-radius:10px}
</style>
</head>
<body>
<div id="root">
  <div id="pg" class="pg" style="display:none"></div>
  <nav id="bnav" style="display:none"></nav>
  <div id="toast"></div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════
// PERSISTENT STORAGE — sabkuch yahan save hoga
// ════════════════════════════════════════════════════════
function load(key, def){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):def; }catch(e){ return def; } }

// Clear old pre-filled chapters if they exist (one-time migration)
(function clearOldChapters(){
  try{
    const saved = localStorage.getItem('ea_chapters');
    if(saved){
      const parsed = JSON.parse(saved);
      // If any key has English chapter names (old data), clear it
      const hasOld = Object.values(parsed).some(arr=>
        Array.isArray(arr) && arr.some(ch=>
          ['Real Numbers','Chemical Reactions','French Revolution','Matter Around Us',
           'Number Systems','Physical Fitness','Grammar','Kshitij'].includes(ch)
        )
      );
      if(hasOld){ localStorage.removeItem('ea_chapters'); }
    }
  }catch(e){}
})();
function save(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

// Admin credentials (permanently saved)
const CREDS = load('ea_creds', { email:'admin@eduai.com', password:'Admin@123' });

// All study materials — permanently saved, never deleted automatically
let MATS = load('ea_mats', []);

// Student bookmarks
let BMARKS = load('ea_bmarks', []);

// Subjects per class
// SUBJECTS — dynamic, admin can add/remove
let SUBJECTS_DATA = load('ea_subjects', {
  '9':  ['Math','Science','SST','English','Hindi','Sanskrit','Physical'],
  '10': ['Math','Science','SST','English','Hindi','Sanskrit','Physical'],
});
function getSubjects(cls){ return SUBJECTS_DATA[cls]||[]; }
// Keep SUBJECTS as reference getter for backward compat
const SUBJECTS = new Proxy({}, { get:(_,k)=>SUBJECTS_DATA[k]||[] });

// Chapters — admin se add/manage honge
let CHAPTERS = load('ea_chapters', {});

const TYPE_INFO = {
  pdf:   {label:'PDF Notes',  icon:'📄', color:'#ff5252'},
  video: {label:'Video',      icon:'🎬', color:'#6c63ff'},
  note:  {label:'Notes',      icon:'📝', color:'#22d3ee'},
  book:  {label:'Book',       icon:'📚', color:'#ff922b'},
  pyq:   {label:'PYQ',        icon:'📋', color:'#f472b6'},
  quiz:  {label:'Quiz/Test',  icon:'❓', color:'#ffd43b'},
  image: {label:'Image',      icon:'🖼️', color:'#00d68f'},
};
const SUBJ_COLOR = {Math:'#6c63ff',Science:'#00d68f',SST:'#ff5252',English:'#22d3ee',Hindi:'#ffd43b',Sanskrit:'#cc5de8',Physical:'#51cf66',Physics:'#f472b6',Chemistry:'#00d68f',Biology:'#51cf66',Economics:'#ff922b','Computer Science':'#4dabf7'};
const CLASS_COL = {'9':'#00d68f','10':'#ff922b'};

// ════════════════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════════════════
const S = {
  view:'main',    // main | admin
  nav:'home',     // home | explore | saved | profile
  cls:'10',
  subj:null,
  chapter:null,
  viewMat:null,
  quiz:null,
  theme:'dark',
  adTab:'dashboard',
  adForm:null,
  adEditId:null,
  adFilterCls:'10',
  adFilterSubj:'Math',
  adChCls:'10',
  adChSubj:'Math',
  srq:'',
  srType:'all',
  srCls:'all',
  studyCls:'10',
  studySubj:null,
  studyChapter:null,
  studyMatType:'all',
  toolTab:'calc',
};

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function go(p){ Object.assign(S,p); render(); }
function mk(tag,a){ const e=document.createElement(tag); if(a) for(const[k,v] of Object.entries(a)){ if(k==='class')e.className=v; else if(k==='style')e.style.cssText=v; else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v); else e.setAttribute(k,v); } return e; }
function d(s){ const e=mk('div'); if(s)e.style.cssText=s; return e; }
function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=(type==='ok'?'✅ ':type==='err'?'❌ ':type==='info'?'ℹ️ ':'⚠️ ')+msg;
  t.style.background=type==='ok'?'var(--green)':type==='err'?'var(--red)':type==='info'?'var(--acc)':'var(--orange)';
  t.style.color='#fff';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2500);
}
function svMats(){ save('ea_mats',MATS); }
function svBmarks(){ save('ea_bmarks',BMARKS); }
function svChapters(){ save('ea_chapters',CHAPTERS); }
function svCreds(){ save('ea_creds',CREDS); }

// ── STUDENT SYSTEM ──────────────────────────────────────
// Students list — admin manages, students self-register
let STUDENTS = load('ea_students', []);
function svStudents(){ save('ea_students', STUDENTS); }
let NEWS = load('ea_news', []);
function svNews(){ save('ea_news', NEWS); }
// NOTIFS already as ea_notifs, just ensure helper
function svNotifs(ns){ save('ea_notifs', ns); }

// Current logged-in student session
let CUR_STUDENT = load('ea_session', null); // null = not logged in

function studentLogin(name, phone, cls, board){
  // Check if already registered by phone
  let student = STUDENTS.find(s => s.phone === phone);
  if(!student){
    // New registration
    student = {
      id: 'stu_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      name: name.trim(),
      phone: phone.trim(),
      cls: cls,
      board: board,
      joinDate: new Date().toISOString().split('T')[0],
      lastSeen: new Date().toISOString().split('T')[0],
      active: true,
    };
    STUDENTS.push(student);
    svStudents();
  } else {
    // Existing — update lastSeen
    student.lastSeen = new Date().toISOString().split('T')[0];
    if(name.trim()) student.name = name.trim();
    svStudents();
  }
  CUR_STUDENT = student;
  save('ea_session', student);
  return student;
}

function studentLogout(){
  CUR_STUDENT = null;
  localStorage.removeItem('ea_session');
}

function updateStudentLastSeen(){
  if(!CUR_STUDENT) return;
  const today = new Date().toISOString().split('T')[0];
  if(CUR_STUDENT.lastSeen === today) return;
  CUR_STUDENT.lastSeen = today;
  const idx = STUDENTS.findIndex(s=>s.id===CUR_STUDENT.id);
  if(idx>=0){ STUDENTS[idx].lastSeen = today; svStudents(); }
  save('ea_session', CUR_STUDENT);
}
function getChaps(cls,subj){ return CHAPTERS[`${cls}_${subj}`]||[]; }
function getMats(f={}){ return MATS.filter(m=>(!f.cls||m.cls===f.cls)&&(!f.subj||m.subject===f.subj)&&(!f.chapter||m.chapter===f.chapter)&&(!f.type||m.type===f.type)); }
function fdate(d){ try{ return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return d; } }

// ════════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════════
function render(){
  const pg=document.getElementById('pg'), nav=document.getElementById('bnav');
  document.querySelectorAll('.ov,.sheet-bg').forEach(e=>e.remove());

  if(S.view==='admin'){
    pg.className='pg pg-full'; pg.style.display='block'; nav.style.display='none';
    pg.innerHTML=''; pg.appendChild(buildAdmin()); pg.scrollTop=0;
    if(S.viewMat) openViewer(S.viewMat,true);
    return;
  }

  pg.className='pg'; pg.style.display='block'; nav.style.display='flex';
  pg.innerHTML='';
  switch(S.nav){
    case 'home':    pg.appendChild(buildHome()); break;
    case 'study':   pg.appendChild(buildStudy()); break;
    case 'tools':   pg.appendChild(buildTools()); break;
    case 'news':    pg.appendChild(buildNews()); break;
    case 'explore': pg.appendChild(buildExplore()); break;
    case 'saved':   pg.appendChild(buildSaved()); break;
    case 'profile': pg.appendChild(buildProfile()); break;
  }
  pg.scrollTop=0;
  buildBNav();
  if(S.viewMat) openViewer(S.viewMat,false);
  if(S.quiz) runQuiz(S.quiz);
}


// ════════════════════════════════════════════════════════
// NOTIFICATIONS (shown on Home)
// ════════════════════════════════════════════════════════
function showNotifications(){
  const notifs=load('ea_notifs',[]);
  const bg=mk('div',{class:'sheet-bg'}); bg.onclick=()=>bg.remove();
  const sh=mk('div',{class:'sheet'}); sh.onclick=e=>e.stopPropagation();
  sh.innerHTML=`<div class="shdl"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-weight:900;font-size:17px;color:var(--text)">🔔 Notifications</div>
    <button onclick="const n=load('ea_notifs',[]);n.forEach(x=>x.read=true);save('ea_notifs',n);this.closest('.sheet-bg').remove();render();" style="background:var(--acc)18;border:none;border-radius:8px;padding:5px 12px;color:var(--acc);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit">All Read ✓</button>
  </div>`;
  if(notifs.length===0){
    sh.innerHTML+=`<div style="text-align:center;padding:30px 20px;color:var(--sub)"><div style="font-size:40px">🔔</div><div style="font-weight:700;color:var(--text);margin-top:8px">Koi notification nahi</div></div>`;
  } else {
    const ll=mk('div',{style:'display:flex;flex-direction:column;gap:8px'});
    [...notifs].reverse().forEach((n,i)=>{
      const row=mk('div',{style:`background:${n.read?'var(--card2)':'var(--acc)12'};border:1px solid ${n.read?'var(--border)':'var(--acc)30'};border-radius:13px;padding:13px 14px`});
      row.innerHTML=`<div style="display:flex;align-items:flex-start;gap:10px">
        <div style="width:36px;height:36px;border-radius:10px;background:var(--acc)22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${n.icon||'📢'}</div>
        <div style="flex:1"><div style="font-weight:${n.read?'600':'800'};font-size:13px;color:var(--text);margin-bottom:3px">${n.title}</div>
        <div style="font-size:12px;color:var(--sub);line-height:1.5">${n.body||''}</div>
        <div style="font-size:10px;color:var(--sub);margin-top:4px">${fdate(n.date||new Date().toISOString().split('T')[0])}</div></div>
        ${!n.read?`<div style="width:8px;height:8px;border-radius:50%;background:var(--acc);margin-top:4px;flex-shrink:0"></div>`:''}
      </div>`;
      ll.appendChild(row);
    });
    sh.appendChild(ll);
  }
  bg.appendChild(sh); document.getElementById('root').appendChild(bg);
}
function buildBNav(){

  const newsCount = NEWS.length > 0 ? 1 : 0; // show dot if news exists
  [{id:'home',ic:'🏠',l:'Home'},{id:'study',ic:'📚',l:'Study'},{id:'news',ic:'📰',l:'News'},{id:'tools',ic:'🔧',l:'Tools'},{id:'profile',ic:'👤',l:'Profile'}].forEach((it,i)=>{

// ════════════════════════════════════════════════════════
// STUDENT LOGIN / REGISTER SCREEN
// ════════════════════════════════════════════════════════
function showStudentLogin(){
  // Remove any existing login screen
  document.getElementById('stu-login-screen')?.remove();

  const screen = mk('div',{id:'stu-login-screen',style:'position:fixed;inset:0;z-index:8000;background:linear-gradient(160deg,#06060f,#0d0d25,#050518);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto'});

  function draw(mode){ // mode: 'login' | 'register'
    screen.innerHTML='';
    const card = mk('div',{style:'width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:26px 22px;box-shadow:0 8px 40px rgba(0,0,0,.5)'});

    // Logo
    const logo = d('text-align:center;margin-bottom:22px');
    logo.innerHTML=`
      <div style="font-size:54px;filter:drop-shadow(0 0 24px #6c63ff);margin-bottom:8px">🎓</div>
      <div style="font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.5px">EduAI</div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">Class 9 & 10 • HBSE / CBSE</div>`;
    card.appendChild(logo);

    if(mode==='login'){
      // Login form
      const title = d('margin-bottom:16px');
      title.innerHTML=`<div style="font-weight:800;font-size:16px;color:var(--text)">👋 Welcome Back!</div><div style="font-size:12px;color:var(--sub);margin-top:3px">Apna phone number daalo — login ho jao</div>`;
      card.appendChild(title);

      const phoneWrap = d('margin-bottom:14px');
      phoneWrap.innerHTML=`<label style="font-size:12px;color:var(--sub);display:block;margin-bottom:5px;font-weight:700">📱 Phone Number</label>`;
      const phoneInp = mk('input',{class:'inp',type:'tel',placeholder:'10 digit mobile number...',maxlength:'10',style:'font-size:16px;letter-spacing:2px'});
      phoneWrap.appendChild(phoneInp); card.appendChild(phoneWrap);

      const loginBtn = mk('button',{class:'btn btn-acc',style:'font-size:15px;font-weight:800;margin-bottom:12px'});
      loginBtn.textContent='🚀 Login Karein';
      loginBtn.onclick=()=>{
        const ph = phoneInp.value.trim().replace(/\s/g,'');
        if(ph.length!==10||!/^\d+$/.test(ph)){ toast('10 digit phone number daalo!','err'); return; }
        const existing = STUDENTS.find(s=>s.phone===ph);
        if(!existing){ draw('register_with_phone'); document.getElementById('stu-reg-phone').value=ph; return; }
        if(existing.active===false){ toast('Aapka account remove kar diya gaya hai. Admin se contact karein.','err'); return; }
        // Found — log them in
        existing.lastSeen = new Date().toISOString().split('T')[0];
        const idx = STUDENTS.findIndex(s=>s.id===existing.id);
        if(idx>=0) STUDENTS[idx]=existing;
        svStudents();
        CUR_STUDENT = existing;
        save('ea_session', existing);
        S.cls = existing.cls||'10'; S.studyCls = existing.cls||'10';
        screen.remove(); render();
        toast(`Welcome back, ${existing.name}! 👋`);
      };
      phoneInp.addEventListener('keydown',e=>{ if(e.key==='Enter') loginBtn.click(); });
      card.appendChild(loginBtn);

      const regLink = mk('button',{style:'width:100%;padding:11px;background:transparent;border:1.5px solid var(--border);border-radius:12px;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit'});
      regLink.textContent='Naya Account Banao →';
      regLink.onclick=()=>draw('register');
      card.appendChild(regLink);

    } else if(mode==='register' || mode==='register_with_phone'){
      // Register form
      const title = d('margin-bottom:16px');
      title.innerHTML=`<div style="font-weight:800;font-size:16px;color:var(--text)">✨ Naya Account Banao</div><div style="font-size:12px;color:var(--sub);margin-top:3px">Ek baar register karo — hamesha login rahega</div>`;
      card.appendChild(title);

      const fields = [
        {label:'👤 Aapka Naam *', id:'stu-reg-name', type:'text', ph:'Apna poora naam likhein...'},
        {label:'📱 Phone Number *', id:'stu-reg-phone', type:'tel', ph:'10 digit mobile number...', maxlen:'10'},
      ];
      fields.forEach(f=>{
        const fw = d('margin-bottom:11px');
        fw.innerHTML=`<label style="font-size:12px;color:var(--sub);display:block;margin-bottom:5px;font-weight:700">${f.label}</label>`;
        const inp = mk('input',{class:'inp',id:f.id,type:f.type,placeholder:f.ph,style:'font-size:15px'});
        if(f.maxlen) inp.setAttribute('maxlength',f.maxlen);
        fw.appendChild(inp); card.appendChild(fw);
      });

      // Class selector
      const clsWrap = d('margin-bottom:11px');
      clsWrap.innerHTML=`<label style="font-size:12px;color:var(--sub);display:block;margin-bottom:7px;font-weight:700">🎓 Apni Class *</label>`;
      const clsRow = d('display:flex;gap:8px');
      let selCls2 = '10';
      ['9','10'].forEach(cls=>{
        const col = CLASS_COL[cls];
        const btn = mk('button',{id:`reg-cls-${cls}`,style:`flex:1;padding:12px 0;border-radius:12px;border:2px solid ${selCls2===cls?col:'var(--border)'};background:${selCls2===cls?col+'22':'transparent'};color:${selCls2===cls?col:'var(--sub)'};font-weight:${selCls2===cls?'800':'600'};font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s`});
        btn.textContent='Class '+cls;
        btn.onclick=()=>{
          selCls2=cls;
          ['9','10'].forEach(c2=>{
            const b2=document.getElementById('reg-cls-'+c2);
            if(!b2)return;
            const col2=CLASS_COL[c2];
            b2.style.borderColor=selCls2===c2?col2:'var(--border)';
            b2.style.background=selCls2===c2?col2+'22':'transparent';
            b2.style.color=selCls2===c2?col2:'var(--sub)';
            b2.style.fontWeight=selCls2===c2?'800':'600';
          });
        };
        clsRow.appendChild(btn);
      });
      clsWrap.appendChild(clsRow); card.appendChild(clsWrap);

      // Board selector
      const brdWrap = d('margin-bottom:16px');
      brdWrap.innerHTML=`<label style="font-size:12px;color:var(--sub);display:block;margin-bottom:7px;font-weight:700">📋 Board *</label>`;
      const brdRow = d('display:flex;gap:8px');
      let selBrd = 'HBSE';
      ['HBSE','CBSE'].forEach(brd=>{
        const btn = mk('button',{id:`reg-brd-${brd}`,style:`flex:1;padding:11px 0;border-radius:12px;border:2px solid ${selBrd===brd?'var(--acc)':'var(--border)'};background:${selBrd===brd?'var(--acc)22':'transparent'};color:${selBrd===brd?'var(--acc)':'var(--sub)'};font-weight:${selBrd===brd?'800':'600'};font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s`});
        btn.textContent=brd;
        btn.onclick=()=>{
          selBrd=brd;
          ['HBSE','CBSE'].forEach(b2=>{
            const el=document.getElementById('reg-brd-'+b2);
            if(!el)return;
            el.style.borderColor=selBrd===b2?'var(--acc)':'var(--border)';
            el.style.background=selBrd===b2?'var(--acc)22':'transparent';
            el.style.color=selBrd===b2?'var(--acc)':'var(--sub)';
            el.style.fontWeight=selBrd===b2?'800':'600';
          });
        };
        brdRow.appendChild(btn);
      });
      brdWrap.appendChild(brdRow); card.appendChild(brdWrap);

      const regBtn = mk('button',{class:'btn btn-green',style:'font-size:15px;font-weight:800;margin-bottom:12px'});
      regBtn.textContent='✅ Account Banao & Login';
      regBtn.onclick=()=>{
        const name = document.getElementById('stu-reg-name')?.value?.trim();
        const ph = document.getElementById('stu-reg-phone')?.value?.trim().replace(/\s/g,'');
        if(!name){ toast('Naam likhna zaroori hai!','err'); return; }
        if(!ph||ph.length!==10||!/^\d+$/.test(ph)){ toast('10 digit phone number daalo!','err'); return; }
        if(STUDENTS.find(s=>s.phone===ph)){ toast('Yeh number already registered hai! Login karein.','warn'); draw('login'); return; }
        const stu = studentLogin(name, ph, selCls2, selBrd);
        S.cls = stu.cls; S.studyCls = stu.cls;
        screen.remove(); render();
        toast(`Welcome ${stu.name}! 🎉 Account ban gaya!`);
      };
      card.appendChild(regBtn);

      const backBtn = mk('button',{style:'width:100%;padding:10px;background:transparent;border:none;color:var(--sub);font-size:12px;cursor:pointer;font-family:inherit'});
      backBtn.textContent='← Pehle se account hai? Login karein';
      backBtn.onclick=()=>draw('login');
      card.appendChild(backBtn);
    }

    screen.appendChild(card);
  }

  draw('login');
  document.getElementById('root').appendChild(screen);
}

function matCard(m){
  const ti=TYPE_INFO[m.type]||{label:m.type,icon:'📄',color:'#666'};
  const sc=SUBJ_COLOR[m.subject]||'#6c63ff';
  const bkd=BMARKS.includes(m.id);
  const row=mk('div',{class:'mc fadein'});
  row.innerHTML=`
  <div class="mico" style="background:${sc}18">${m.thumb||ti.icon}</div>
  <div style="flex:1;overflow:hidden">
    <div style="font-weight:700;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px">${m.title}</div>
    <div style="font-size:11px;color:var(--sub);margin-bottom:5px">${m.subject}${m.chapter?` • ${m.chapter}`:''} • Class ${m.cls}</div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span class="badge type-${m.type}">${ti.icon} ${ti.label}</span>
      ${m.views>0?`<span style="font-size:10px;color:var(--sub)">👁 ${m.views}</span>`:''}
      ${fdate(m.date)!==m.date?`<span style="font-size:10px;color:var(--sub)">${fdate(m.date)}</span>`:''}
    </div>
  </div>
  <button class="bk-btn" style="background:none;border:none;font-size:20px;cursor:pointer;flex-shrink:0;opacity:${bkd?1:.3};transition:opacity .2s">${bkd?'🔖':'🔖'}</button>`;
  row.onclick=e=>{ if(e.target.closest('.bk-btn')) return; openMat(m); };
  row.querySelector('.bk-btn').onclick=e=>{ e.stopPropagation(); toggleBmark(m.id); };
  return row;
}

function toggleBmark(id){
  const i=BMARKS.indexOf(id);
  if(i>=0) BMARKS.splice(i,1); else BMARKS.push(id);
  svBmarks(); render();
  toast(i>=0?'Bookmark hata diya':'Bookmark save ho gaya! 🔖');
}

function openMat(m){
  const i=MATS.findIndex(x=>x.id===m.id);
  if(i>=0){ MATS[i].views=(MATS[i].views||0)+1; svMats(); }
  if(m.type==='quiz' && m.questions?.length){ go({quiz:m}); return; }
  go({viewMat:m});
}

// ════════════════════════════════════════════════════════
// QUIZ RUNNER
// ════════════════════════════════════════════════════════
function runQuiz(m){
  const qs=m.questions||[];
  let qi=0, score=0, ans=null;
  const ov=mk('div',{class:'ov fadein'});

  function draw(){
    ov.innerHTML='';
    if(qi>=qs.length){
      // Result
      const pct=Math.round((score/qs.length)*100);
      ov.innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
        <div style="font-size:72px;margin-bottom:12px">${pct>=80?'🏆':pct>=60?'👍':'💪'}</div>
        <div style="font-size:26px;font-weight:900;color:var(--text)">Test Complete!</div>
        <div style="font-size:15px;color:var(--sub);margin-top:5px">${score} / ${qs.length} sahi</div>
        <div style="width:100%;max-width:280px;margin:22px auto">
          <div style="background:var(--card);border-radius:18px;padding:22px;border:1px solid var(--border)">
            <div style="font-size:48px;font-weight:900;color:${pct>=80?'var(--green)':pct>=60?'var(--orange)':'var(--red)'}">${pct}%</div>
            <div class="prog" style="margin-top:12px"><div style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=60?'var(--orange)':'var(--red)'}"></div></div>
            <div style="font-size:13px;color:var(--sub);margin-top:10px">${pct>=80?'Bahut badhiya! 🌟':pct>=60?'Achha kiya! 👏':'Aur mehnat karo 📖'}</div>
          </div>
        </div>
        <button onclick="qi=0;score=0;ans=null;draw()" style="width:100%;max-width:280px;padding:13px;border-radius:13px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:800;font-size:14px;border:none;cursor:pointer;margin-bottom:9px;font-family:inherit">🔄 Dobara Karo</button>
        <button onclick="ov.remove();S.quiz=null;render()" style="width:100%;max-width:280px;padding:12px;border-radius:13px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit">← Wapas</button>
      </div>`;
      return;
    }
    const q=qs[qi];
    const hdr=mk('div',{class:'ghdr',style:'position:sticky;top:0;z-index:10'});
    hdr.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <button onclick="ov.remove();S.quiz=null;render()" style="background:rgba(255,255,255,.1);border:none;color:var(--text);border-radius:9px;padding:7px 11px;cursor:pointer;font-size:14px;font-family:inherit">✕</button>
      <div style="flex:1"><div style="font-weight:700;font-size:14px;color:var(--text)">${m.title}</div><div style="font-size:11px;color:var(--sub)">Question ${qi+1} of ${qs.length}</div></div>
      <div style="font-weight:800;font-size:15px;color:var(--green)">${score}/${qs.length}</div>
    </div>
    <div class="prog"><div style="width:${(qi/qs.length)*100}%;background:var(--green)"></div></div>`;
    ov.appendChild(hdr);

    const body=d('padding:18px 16px');
    const qbox=mk('div',{style:'background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:16px'});
    qbox.innerHTML=`<div style="font-size:12px;color:var(--sub);font-weight:700;margin-bottom:7px">Q${qi+1}.</div><div style="font-size:15px;font-weight:700;color:var(--text);line-height:1.5">${q.q}</div>`;
    body.appendChild(qbox);

    q.opts.forEach((opt,i)=>{
      const b=mk('button',{class:'qopt'});
      b.innerHTML=`<span style="width:26px;height:26px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0">${String.fromCharCode(65+i)}</span>${opt}`;
      if(ans!==null){ if(i===q.ans) b.classList.add('correct'); else if(i===ans) b.classList.add('wrong'); }
      b.onclick=()=>{
        if(ans!==null) return;
        ans=i; if(i===q.ans) score++;
        draw();
        setTimeout(()=>{ ans=null; qi++; draw(); },1100);
      };
      body.appendChild(b);
    });
    ov.appendChild(body);
  }
  draw();
  document.getElementById('root').appendChild(ov);
}

  } else {
    const ll=mk('div',{style:'display:flex;flex-direction:column;gap:7px'});
    chapters.forEach((ch,i)=>{
      const mats=getMats({cls,subj,chapter:ch});

      <span style="color:var(--sub);font-size:16px">›</span>`;

  bg.appendChild(sh); document.getElementById('root').appendChild(bg);
}

// CHAPTER VIEW (full overlay with type filter)
// ════════════════════════════════════════════════════════
function showChapterView(cls,subj,chapter){
  const ov=mk('div',{class:'ov fadein'});
  const col=SUBJ_COLOR[subj]||'#6c63ff';
  let activeType='all';

  function draw(){
    ov.innerHTML='';
    const mats=getMats({cls,subj,chapter});
    const filtered=activeType==='all'?mats:mats.filter(m=>m.type===activeType);

    const hdr=mk('div',{style:`background:linear-gradient(135deg,${col}44,${col}18,#0a0a14);padding:14px 16px 18px;border-bottom-left-radius:20px;border-bottom-right-radius:20px`});

    // Back button row
    const cvback=mk('button',{style:'background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:5px'});
    cvback.innerHTML='← '+subj;
    cvback.onclick=()=>ov.remove();

    const chInfo=mk('div',{style:'margin-bottom:12px'});
    chInfo.innerHTML=`<div style="color:#fff;font-weight:900;font-size:17px;margin-bottom:2px">${chapter}</div><div style="color:rgba(255,255,255,.6);font-size:12px">${subj} • Class ${cls} • ${mats.length} materials</div>`;

    const typeRow=mk('div',{style:'display:flex;gap:7px;overflow-x:auto;scrollbar-width:none'});
    [['all','🔥 All'],['pdf','📄 PDF'],['video','🎬 Video'],['note','📝 Notes'],['book','📚 Book'],['pyq','📋 PYQ'],['quiz','❓ Test'],['image','🖼️ Image']].forEach(([t,l])=>{
      const tb=mk('button',{style:`white-space:nowrap;padding:7px 13px;border-radius:20px;border:none;background:${activeType===t?'rgba(255,255,255,.2)':'rgba(255,255,255,.07)'};color:var(--text);font-weight:${activeType===t?'800':'500'};font-size:12px;cursor:pointer;font-family:inherit`});
      tb.textContent=l;
      tb.onclick=(()=>{const tv=t;return()=>{activeType=tv;draw();};})();
      typeRow.appendChild(tb);
    });

    hdr.append(cvback,chInfo,typeRow);

    const body=d('padding:14px 14px 80px');
    if(filtered.length===0){
      const e=d('text-align:center;padding:50px 20px;color:var(--sub)');
      e.innerHTML=`<div style="font-size:42px">📭</div><div style="font-weight:700;color:var(--text);margin-top:8px">Is type ka koi material nahi</div>`;
      body.appendChild(e);
    } else {
      const ll=d('display:flex;flex-direction:column;gap:9px');
      filtered.forEach(m=>ll.appendChild(matCard(m)));
      body.appendChild(ll);
    }
    ov.appendChild(hdr); ov.appendChild(body);
  }
  draw();
  document.getElementById('root').appendChild(ov);
}

function buildStudy(){
  const w = mk('div',{class:'fadein',style:'padding-bottom:80px'});

  // State for study section (local to this build)
  const SS = {
    cls: S.studyCls||'10',
    subj: S.studySubj||null,
    chapter: S.studyChapter||null,
    matType: S.studyMatType||'all',
  };

  function saveSS(){ S.studyCls=SS.cls; S.studySubj=SS.subj; S.studyChapter=SS.chapter; S.studyMatType=SS.matType; }

  function draw(){
    w.innerHTML='';
    if(SS.chapter) renderMaterials();
    else if(SS.subj) renderChapters();
    else renderSubjects();
  }

  // ── SUBJECTS VIEW ──
  function renderSubjects(){
    const subs = SUBJECTS[SS.cls]||[];
    const SICO={Math:'📐',Science:'🔬',SST:'🌍',English:'📝',Hindi:'📖',Sanskrit:'🕉️',Physical:'🏃'};

    // Header
    const hdr = mk('div',{style:'background:linear-gradient(135deg,#0d0520,#0a1540,#0d1020);padding:20px 16px 22px;border-bottom-left-radius:24px;border-bottom-right-radius:24px'});
    hdr.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="color:#a89fff;font-size:12px;font-weight:600;letter-spacing:.5px">📚 STUDY MATERIALS</div>
        <div style="color:#fff;font-weight:900;font-size:22px;margin-top:3px;letter-spacing:-.3px">Padhai Karo</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="go({nav:'explore',srq:''})" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 10px;font-size:17px;cursor:pointer;color:var(--text)">🔍</button>
      </div>
    </div>
    <div id="cls-btn-row" style="display:flex;gap:8px"></div>`;
    w.appendChild(hdr);

    // Class buttons — proper DOM nodes with closure access
    const clsBtnRow = hdr.querySelector('#cls-btn-row');
    ['9','10'].forEach(cls2=>{
      const col2 = CLASS_COL[cls2]||'#6c63ff';
      const isActive = SS.cls===cls2;
      const cb = mk('button',{style:`padding:9px 24px;border-radius:12px;border:2px solid ${isActive?col2:'rgba(255,255,255,.15)'};background:${isActive?col2+'33':'transparent'};color:${isActive?col2:'rgba(255,255,255,.6)'};font-weight:${isActive?'800':'600'};font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s`});
      cb.textContent='Class '+cls2;
      cb.onclick=()=>{ SS.cls=cls2; SS.subj=null; SS.chapter=null; saveSS(); draw(); };
      clsBtnRow.appendChild(cb);
    });

    const body = d('padding:16px 14px 0');

    // Stats bar
    const totalMats = getMats({cls:SS.cls}).length;
    const sb = mk('div',{style:'display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px'});
    Object.entries(TYPE_INFO).forEach(([tp,info])=>{
      const n = getMats({cls:SS.cls,type:tp}).length;
      if(!n) return;
      const chip = mk('div',{style:`flex-shrink:0;background:${info.color}15;border:1px solid ${info.color}30;border-radius:20px;padding:6px 12px;display:flex;align-items:center;gap:5px`});
      chip.innerHTML=`<span style="font-size:14px">${info.icon}</span><span style="font-size:11px;font-weight:700;color:${info.color}">${n} ${info.label}</span>`;
      sb.appendChild(chip);
    });
    if(totalMats>0) body.appendChild(sb);

// CALCULATOR
// ════════════════════════════════════════════════════════
function buildCalculator(){
  const w=mk('div',{style:'padding-bottom:20px'});
  let display='0', expr='', mode='basic', calcHist=load('ea_calc_hist',[]), showHist=false, justCalc=false, deg=true;

  function draw(){
    w.innerHTML='';

    // Mode toggle
    const mt=mk('div',{style:'display:flex;gap:0;background:var(--card2);border-radius:12px;padding:3px;margin-bottom:12px'});
    [['basic','Basic 🔢'],['sci','Scientific 🔬']].forEach(([m,l])=>{
      const b=mk('button',{style:`flex:1;padding:8px 0;border-radius:9px;border:none;background:${mode===m?'var(--card)':'transparent'};color:${mode===m?'var(--text)':'var(--sub)'};font-weight:${mode===m?'800':'500'};font-size:12px;cursor:pointer;font-family:inherit;box-shadow:${mode===m?'0 1px 4px rgba(0,0,0,.2)':'none'};transition:all .2s`});
      b.textContent=l;
      b.onclick=()=>{mode=m;draw();};
      mt.appendChild(b);
    });
    w.appendChild(mt);

    // Display
    const disp=mk('div',{style:'background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 20px 14px;margin-bottom:12px'});
    const exprEl=mk('div',{style:'font-size:12px;color:var(--sub);text-align:right;min-height:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px'});
    exprEl.textContent=justCalc?'= Result':(expr.length>0?expr:' ');
    const dispEl=mk('div',{style:`font-size:${display.length>14?18:display.length>10?24:display.length>7?32:40}px;font-weight:900;color:var(--text);text-align:right;line-height:1.1;word-break:break-all`});
    dispEl.textContent=display;
    disp.append(exprEl,dispEl);
    w.appendChild(disp);

    // Buttons
    const brows = mode==='sci'?[
      ['sin','cos','tan',deg?'DEG':'RAD'],
      ['log','ln','√','π'],
      ['x²','xⁿ','1/x','℮'],
      ['n!','(',')','^'],
      ['C','±','⌫','÷'],
      ['7','8','9','×'],
      ['4','5','6','−'],
      ['1','2','3','+'],
      ['0','.','%','='],
    ]:[
      ['C','±','%','÷'],
      ['7','8','9','×'],
      ['4','5','6','−'],
      ['1','2','3','+'],
      ['0','.','⌫','='],
    ];

    const btnArea=mk('div',{});
    brows.forEach(row=>{
      const rw=mk('div',{style:`display:grid;grid-template-columns:repeat(${row.length},1fr);gap:8px;margin-bottom:8px`});
      row.forEach(v=>{
        const isE=v==='=',isO=['÷','×','−','+','^'].includes(v),isF=['sin','cos','tan','log','ln','√','x²','xⁿ','1/x','℮','n!','π','DEG','RAD'].includes(v),isC=v==='C',isG=['±','%','(',')','⌫'].includes(v);
        let cls2='calc-btn';
        if(isE)cls2+=' cb-e';else if(isO)cls2+=' cb-o';else if(isF)cls2+=' cb-f';else if(isC)cls2+=' cb-c';else if(isG)cls2+=' cb-g';else cls2+=' cb-n';
        const b=mk('button',{class:cls2});
        b.textContent=v;
        b.addEventListener('click',()=>calcPress(v));
        rw.appendChild(b);
      });
      btnArea.appendChild(rw);
    });
    w.appendChild(btnArea);

    // History
    if(calcHist.length>0){
      const ht=mk('div',{style:'margin-top:12px'});
      const htitle=mk('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'});
      htitle.innerHTML=`<span style="font-weight:700;font-size:13px;color:var(--text)">📋 History</span>`;
      const clr=mk('button',{style:'background:none;border:none;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit'});clr.textContent='Clear';
      clr.onclick=()=>{calcHist=[];save('ea_calc_hist',[]);draw();};
      htitle.appendChild(clr); ht.appendChild(htitle);
      calcHist.slice(0,5).forEach(h=>{
        const row=mk('div',{style:'display:flex;justify-content:space-between;padding:8px 12px;background:var(--card2);border-radius:10px;margin-bottom:5px;cursor:pointer'});
        row.innerHTML=`<span style="font-size:12px;color:var(--sub)">${h.e}</span><span style="font-size:13px;font-weight:700;color:var(--acc)">= ${h.r}</span>`;
        row.onclick=()=>{display=h.r;expr=h.r;justCalc=true;draw();};
        ht.appendChild(row);
      });
      w.appendChild(ht);
    }
  }

  function calcPress(v){
    if(v==='DEG'||v==='RAD'){deg=!deg;draw();return;}
    if(v==='C'){display='0';expr='';justCalc=false;draw();return;}
    if(v==='±'){display=display.startsWith('-')?display.slice(1):'-'+display;expr=display;draw();return;}
    if(v==='⌫'){if(justCalc){display='0';expr='';justCalc=false;draw();return;}display=display.length>1?display.slice(0,-1):'0';expr=expr.slice(0,-1)||'0';draw();return;}
    if(v==='='){
      try{
        let ex=expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/π/g,String(Math.PI)).replace(/℮/g,String(Math.E)).replace(/\^/g,'**').replace(/√\(/g,'Math.sqrt(')
          .replace(/sin\(/g,deg?'(x=>Math.sin(x*Math.PI/180))(':'Math.sin(')
          .replace(/cos\(/g,deg?'(x=>Math.cos(x*Math.PI/180))(':'Math.cos(')
          .replace(/tan\(/g,deg?'(x=>Math.tan(x*Math.PI/180))(':'Math.tan(')
          .replace(/log\(/g,'Math.log10(').replace(/ln\(/g,'Math.log(')
          .replace(/abs\(/g,'Math.abs(')
          .replace(/(\d+)!/g,(_,n)=>{let f=1;for(let i=2;i<=+n;i++)f*=i;return f;});
        const r=Function('"use strict";return('+ex+')')();
        const rs=isFinite(r)?(Number.isInteger(r)?String(r):parseFloat(r.toFixed(10)).toString()):'Error';
        calcHist=[{e:display,r:rs},...calcHist.slice(0,19)];
        save('ea_calc_hist',calcHist);
        display=rs;expr=rs;justCalc=true;
      }catch{display='Error';expr='';justCalc=true;}
      draw();return;
    }
    const sm={'sin':'sin(','cos':'cos(','tan':'tan(','log':'log(','ln':'ln(','√':'√(','x²':'^2','xⁿ':'^','1/x':'(1/','n!':'!'};
    if(sm[v]!==undefined){const add=sm[v];if(justCalc){display=display+add;expr=display;justCalc=false;}else{display=display==='0'?add:display+add;expr=expr==='0'?add:expr+add;}draw();return;}
    if(v==='π'||v==='℮'){if(justCalc){display=v;expr=v;justCalc=false;}else{display=display==='0'?v:display+v;expr=expr==='0'?v:expr+v;}draw();return;}
    if(justCalc&&!['+',' -','−','×','÷','%','^','(',')'].includes(v)){display=v;expr=v;justCalc=false;draw();return;}
    justCalc=false;
    if(display==='0'&&!['.','+','-','−','×','÷','%','(',')'].includes(v)){display=v;expr=v;}
    else{display=display+v;expr=expr+v;}
    draw();
  }

  draw();
  return w;
}

};

function buildCalendar(){
  const w=mk('div',{style:'padding-bottom:20px'});
  const today=new Date();
  let curYear=load('ea_cal_year',today.getFullYear());
  let curMonth=load('ea_cal_month',today.getMonth());
  let selectedDate=load('ea_cal_sel',null);
  const EVENTS=load('ea_events',{});
  const TODO_DATA=load('ea_todos',[]);

  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function getDateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function hasTodo(dateKey){ return TODO_DATA.some(t=>t.date===dateKey); }
  function isFestival(dateKey){ return !!FESTIVALS[dateKey]; }

  function draw(){
    w.innerHTML='';
    save('ea_cal_year',curYear);
    save('ea_cal_month',curMonth);
    save('ea_cal_sel',selectedDate);

    // Month navigation
    const nav=mk('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:14px'});
    const prevBtn=mk('button',{style:'background:var(--card2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:16px;color:var(--text);display:flex;align-items:center;justify-content:center'});prevBtn.textContent='‹';
    prevBtn.onclick=()=>{curMonth--;if(curMonth<0){curMonth=11;curYear--;}draw();};
    const nextBtn=mk('button',{style:'background:var(--card2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:16px;color:var(--text);display:flex;align-items:center;justify-content:center'});nextBtn.textContent='›';
    nextBtn.onclick=()=>{curMonth++;if(curMonth>11){curMonth=0;curYear++;}draw();};
    const monthTitle=mk('div',{style:'font-weight:900;font-size:16px;color:var(--text);text-align:center'});
    monthTitle.textContent=`${MONTHS[curMonth]} ${curYear}`;
    nav.append(prevBtn,monthTitle,nextBtn); w.appendChild(nav);

    // Days of week header
    const dayHdr=mk('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px'});
    DAYS.forEach((d,i)=>{
      const el=mk('div',{style:`text-align:center;font-size:11px;font-weight:700;color:${i===0?'var(--red)':'var(--sub)'};padding:4px 0`});
      el.textContent=d; dayHdr.appendChild(el);
    });
    w.appendChild(dayHdr);

    // Calendar grid
    const grid=mk('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px'});
    const firstDay=new Date(curYear,curMonth,1).getDay();
    const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
    // Empty cells
    for(let i=0;i<firstDay;i++){grid.appendChild(d(''));}
    // Day cells
    for(let day=1;day<=daysInMonth;day++){
      const dateKey=getDateKey(curYear,curMonth,day);
      const isToday=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===day;
      const isSun=new Date(curYear,curMonth,day).getDay()===0;
      const hasFest=isFestival(dateKey);
      const hasEv=(EVENTS[dateKey]&&EVENTS[dateKey].length>0)||hasTodo(dateKey);
      const isSel=selectedDate===dateKey;

      let cls='cal-day';
      if(isToday) cls+=' today';
      else if(isSel) cls+=' selected';
      else if(hasFest) cls+=' festival';
      else if(isSun) cls+=' sunday';
      if(hasEv||hasFest) cls+=' has-event';

      const cell=mk('div',{class:cls});
      cell.innerHTML=`<span>${day}</span>`;
      if(hasFest&&!isToday){
        const dot=mk('div',{style:'position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--yellow)'});
        cell.appendChild(dot);
      }
      cell.onclick=()=>{selectedDate=dateKey;draw();};
      grid.appendChild(cell);
    }
    w.appendChild(grid);

    // Selected day details
    if(selectedDate){
      const selCard=mk('div',{style:'background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px'});

      // Date label
      const dlbl=mk('div',{style:'font-weight:800;font-size:14px;color:var(--text);margin-bottom:10px'});
      const dp=selectedDate.split('-');
      dlbl.textContent=`📅 ${dp[2]} ${MONTHS[parseInt(dp[1])-1]} ${dp[0]}`;
      selCard.appendChild(dlbl);

      // Festival?
      if(FESTIVALS[selectedDate]){
        const fv=mk('div',{style:'background:var(--yellow)18;border:1px solid var(--yellow)33;border-radius:10px;padding:8px 12px;margin-bottom:9px;font-size:13px;font-weight:700;color:var(--yellow)'});
        fv.textContent='🎉 '+FESTIVALS[selectedDate];
        selCard.appendChild(fv);
      }

      // Events for this day
      const dayEvs=(EVENTS[selectedDate]||[]);
      dayEvs.forEach((ev,i)=>{
        const evRow=mk('div',{style:'display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)'});
        evRow.innerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:${ev.color||'var(--acc)'};flex-shrink:0"></div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--text)">${ev.title}</div>${ev.time?`<div style="font-size:11px;color:var(--sub)">${ev.time}</div>`:''}</div>`;
        const del=mk('button',{style:'background:none;border:none;color:var(--red);cursor:pointer;font-size:14px'});del.textContent='×';
        del.onclick=()=>{EVENTS[selectedDate].splice(i,1);if(!EVENTS[selectedDate].length)delete EVENTS[selectedDate];save('ea_events',EVENTS);draw();};
        evRow.appendChild(del); selCard.appendChild(evRow);
      });

      // Add event
      const addEvRow=mk('div',{style:'display:flex;gap:7px;margin-top:10px'});
      const evInp=mk('input',{style:'flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:9px 12px;font-size:13px;outline:none;font-family:inherit',placeholder:'Add event or reminder...'});
      const timeInp=mk('input',{type:'time',style:'background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:9px 10px;font-size:12px;outline:none;font-family:inherit;width:90px'});
      const addBtn=mk('button',{style:'background:var(--acc);border:none;border-radius:10px;padding:9px 14px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap'});addBtn.textContent='Add';
      const COLORS=['#6c63ff','#00d68f','#ff922b','#ff5252','#22d3ee','#f472b6'];
      let selColor=COLORS[0];
      const colorRow=mk('div',{style:'display:flex;gap:5px;margin-top:8px'});
      COLORS.forEach(col=>{
        const cb=mk('button',{style:`width:20px;height:20px;border-radius:50%;background:${col};border:${selColor===col?'2px solid #fff':'2px solid transparent'};cursor:pointer;flex-shrink:0;transition:all .2s`});
        cb.onclick=()=>{selColor=col;colorRow.querySelectorAll('button').forEach((b,bi)=>{b.style.border=COLORS[bi]===selColor?'2px solid #fff':'2px solid transparent';});};
        colorRow.appendChild(cb);
      });
      addBtn.onclick=()=>{
        const t=evInp.value.trim();if(!t)return;
        if(!EVENTS[selectedDate])EVENTS[selectedDate]=[];
        EVENTS[selectedDate].push({title:t,time:timeInp.value||'',color:selColor});
        save('ea_events',EVENTS);evInp.value='';timeInp.value='';draw();
        toast('Event add ho gaya!');
      };
      evInp.addEventListener('keydown',e=>{if(e.key==='Enter')addBtn.click();});
      addEvRow.append(evInp,timeInp,addBtn);
      selCard.appendChild(addEvRow);
      selCard.appendChild(colorRow);
      w.appendChild(selCard);
    }

    // Upcoming festivals
    const upFest=mk('div',{style:'background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px'});
    upFest.innerHTML='<div style="font-weight:800;font-size:13px;color:var(--text);margin-bottom:10px">🎉 Upcoming Festivals</div>';
    const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const upcoming=Object.entries(FESTIVALS).filter(([d])=>d>=todayStr).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,5);
    upcoming.forEach(([date,name])=>{
      const row=mk('div',{style:'display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)'});
      const dp2=date.split('-');
      row.innerHTML=`<div style="text-align:center;min-width:36px"><div style="font-size:14px;font-weight:900;color:var(--acc)">${dp2[2]}</div><div style="font-size:9px;color:var(--sub)">${MONTHS[parseInt(dp2[1])-1].slice(0,3)}</div></div>
      <div style="font-size:13px;font-weight:600;color:var(--text)">${name}</div>`;
      upFest.appendChild(row);
    });
    w.appendChild(upFest);
  }

  draw();
  return w;
}

// ════════════════════════════════════════════════════════
// TO-DO LIST
// ════════════════════════════════════════════════════════
function buildTodo(){
  const w=mk('div',{style:'padding-bottom:20px'});
  let todos=load('ea_todos',[]);
  let filter='all'; // all|today|pending|done
  let addDate='';

  function saveTodos(){ save('ea_todos',todos); }
  const today=new Date().toISOString().split('T')[0];

  function draw(){
    w.innerHTML='';

    // Stats
    const total=todos.length, done=todos.filter(t=>t.done).length, pending=total-done;
    const statsRow=mk('div',{style:'display:flex;gap:8px;margin-bottom:14px'});
    [[total,'Total','var(--acc)'],[pending,'Pending','var(--orange)'],[done,'Done','var(--green)']].forEach(([n,l,col])=>{
      const c=mk('div',{style:`flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center`});
      c.innerHTML=`<div style="font-weight:900;font-size:20px;color:${col}">${n}</div><div style="font-size:10px;color:var(--sub)">${l}</div>`;
      statsRow.appendChild(c);
    });
    w.appendChild(statsRow);

    // Add todo
    const addWrap=mk('div',{style:'background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:14px'});
    addWrap.innerHTML='<div style="font-weight:700;font-size:13px;color:var(--text);margin-bottom:10px">➕ New Task</div>';
    const taskInp=mk('input',{class:'inp',style:'margin-bottom:8px',placeholder:'Task likhein... e.g. Chapter 3 padhna hai'});
    const dateRow=mk('div',{style:'display:flex;gap:8px;margin-bottom:9px;align-items:center'});
    const dateInp=mk('input',{type:'date',class:'inp',style:'flex:1;padding:9px 12px;font-size:13px'});
    dateInp.value=today;
    const PRIORITIES=[['🔴','High'],['🟡','Med'],['🟢','Low']];
    let selPri=0;
    const priRow=mk('div',{style:'display:flex;gap:6px'});
    PRIORITIES.forEach(([ic,l],i)=>{
      const pb=mk('button',{style:`padding:7px 12px;border-radius:9px;border:1.5px solid ${selPri===i?'var(--acc)':'var(--border)'};background:${selPri===i?'var(--acc)22':'transparent'};color:${selPri===i?'var(--acc)':'var(--sub)'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s`});
      pb.textContent=ic+' '+l;
      pb.onclick=()=>{selPri=i;priRow.querySelectorAll('button').forEach((b,bi)=>{b.style.borderColor=bi===selPri?'var(--acc)':'var(--border)';b.style.background=bi===selPri?'var(--acc)22':'transparent';b.style.color=bi===selPri?'var(--acc)':'var(--sub)';});};
      priRow.appendChild(pb);
    });
    dateRow.append(dateInp,priRow);
    const addBtn=mk('button',{class:'btn btn-acc',style:'margin-top:4px;font-size:14px'});addBtn.textContent='✅ Task Add Karo';
    addBtn.onclick=()=>{
      const t=taskInp.value.trim();if(!t){toast('Task likhna zaroori hai!','err');return;}
      todos.unshift({id:'t'+Date.now(),text:t,date:dateInp.value,priority:selPri,done:false,created:new Date().toISOString()});
      saveTodos();taskInp.value='';draw();toast('Task add ho gaya! ✅');
    };
    taskInp.addEventListener('keydown',e=>{if(e.key==='Enter')addBtn.click();});
    addWrap.append(taskInp,dateRow,addBtn);
    w.appendChild(addWrap);

    // Filter tabs
    const ftabs=mk('div',{style:'display:flex;gap:0;background:var(--card2);border-radius:11px;padding:3px;margin-bottom:12px'});
    [['all','All'],['today','Today'],['pending','Pending'],['done','Done']].forEach(([f,l])=>{
      const b=mk('button',{style:`flex:1;padding:7px 0;border-radius:8px;border:none;background:${filter===f?'var(--card)':'transparent'};color:${filter===f?'var(--text)':'var(--sub)'};font-weight:${filter===f?'800':'500'};font-size:12px;cursor:pointer;font-family:inherit`});
      b.textContent=l;
      b.onclick=()=>{filter=f;draw();};
      ftabs.appendChild(b);
    });
    w.appendChild(ftabs);

    // Todo list
    let filtered=todos;
    if(filter==='today') filtered=todos.filter(t=>t.date===today);
    else if(filter==='pending') filtered=todos.filter(t=>!t.done);
    else if(filter==='done') filtered=todos.filter(t=>t.done);

    if(filtered.length===0){
      const e=d('text-align:center;padding:30px 20px;background:var(--card2);border-radius:14px;border:1px dashed var(--border);color:var(--sub)');
      e.innerHTML=`<div style="font-size:36px">${filter==='done'?'🎉':'📝'}</div><div style="font-weight:700;color:var(--text);margin-top:7px">${filter==='done'?'Koi completed task nahi':'Koi task nahi!'}</div>`;
      w.appendChild(e);
      return w;
    }

    const PRICOLOR=['var(--red)','var(--yellow)','var(--green)'];
    const PRIIC=['🔴','🟡','🟢'];
    const ll=d('');
    filtered.forEach(t=>{
      const isOver=!t.done&&t.date&&t.date<today;
      const row=mk('div',{class:'todo-item'+(t.done?' done':'')});
      row.style.borderColor=isOver?'var(--red)33':'var(--border)';

      const chk=mk('div',{class:'todo-check'+(t.done?' done':'')});
      chk.innerHTML=t.done?'<span style="color:#fff;font-size:12px">✓</span>':'';
      chk.onclick=()=>{
        const idx=todos.findIndex(x=>x.id===t.id);
        if(idx>=0){todos[idx].done=!todos[idx].done;saveTodos();draw();}
      };

      const info=mk('div',{style:'flex:1;overflow:hidden'});
      info.innerHTML=`<div style="font-size:13px;font-weight:${t.done?'500':'700'};color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:${t.done?'line-through':''}">${PRIIC[t.priority]||'🟡'} ${t.text}</div>
      ${t.date?`<div style="font-size:11px;color:${isOver?'var(--red)':'var(--sub)'};margin-top:2px">${isOver?'⚠️ Overdue • ':'📅 '}${t.date}</div>`:''}`;

      const del=mk('button',{style:'background:none;border:none;color:var(--sub);cursor:pointer;font-size:16px;flex-shrink:0'});del.textContent='×';
      del.onclick=()=>{if(confirm('Delete karein?')){todos=todos.filter(x=>x.id!==t.id);saveTodos();draw();}};

      row.append(chk,info,del);
      ll.appendChild(row);
    });
    w.appendChild(ll);
  }

  draw();
  return w;
}


// ════════════════════════════════════════════════════════
// NEWS SECTION — Student Side
// ════════════════════════════════════════════════════════
function buildNews(){
  const w=mk('div',{class:'fadein',style:'padding-bottom:80px'});
  const allNews=[...NEWS].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const allNotifs=[...load('ea_notifs',[])].reverse();

  // Header
  const hdr=mk('div',{class:'ghdr'});
  hdr.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div>
      <div style="color:#a89fff;font-size:12px;font-weight:600">📰 UPDATES</div>
      <div style="color:#fff;font-weight:900;font-size:20px;margin-top:2px">News & Notifications</div>
    </div>
  </div>`;
  w.appendChild(hdr);

  const body=d('padding:14px 14px 0');

  // Notifications section
  if(allNotifs.length>0){
    const unread=allNotifs.filter(n=>!n.read).length;
    const nsec=d('margin-bottom:20px');
    const ntitle=d('display:flex;align-items:center;justify-content:space-between;margin-bottom:10px');
    ntitle.innerHTML=`<div style="font-weight:800;font-size:14px;color:var(--text)">🔔 Notifications ${unread>0?`<span style="background:var(--red);color:#fff;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:800;margin-left:4px">${unread}</span>`:''}</div>`;
    const markAll=mk('button',{style:'background:var(--acc)18;border:1px solid var(--acc)33;border-radius:8px;padding:5px 11px;color:var(--acc);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit'});
    markAll.textContent='All Read ✓';
    markAll.onclick=()=>{
      const ns=load('ea_notifs',[]);ns.forEach(n=>n.read=true);svNotifs(ns);render();
    };
    if(unread>0) ntitle.appendChild(markAll);
    nsec.appendChild(ntitle);

    allNotifs.slice(0,10).forEach(n=>{
      const card=mk('div',{style:`background:${n.read?'var(--card)':'var(--acc)10'};border:1px solid ${n.read?'var(--border)':'var(--acc)30'};border-radius:14px;padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:all .2s`});
      card.innerHTML=`<div style="display:flex;gap:11px;align-items:flex-start">
        <div style="width:40px;height:40px;border-radius:12px;background:${n.read?'var(--card2)':'var(--acc)22'};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${n.icon||'📢'}</div>
        <div style="flex:1;overflow:hidden">
          <div style="font-weight:${n.read?'600':'800'};font-size:13px;color:var(--text);margin-bottom:3px">${n.title}</div>
          ${n.body?`<div style="font-size:12px;color:var(--sub);line-height:1.55">${n.body}</div>`:''}
          <div style="font-size:10px;color:var(--sub);margin-top:5px">📅 ${fdate(n.date||new Date().toISOString().split('T')[0])}</div>
        </div>
        ${!n.read?`<div style="width:9px;height:9px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:3px"></div>`:''}
      </div>`;
      card.onclick=()=>{
        const ns=load('ea_notifs',[]);
        const idx=ns.findIndex(x=>x.id===n.id);
        if(idx>=0&&!ns[idx].read){ns[idx].read=true;svNotifs(ns);render();}
      };
      nsec.appendChild(card);
    });
    body.appendChild(nsec);
  }

  // News section
  const ntitle2=d('display:flex;align-items:center;justify-content:space-between;margin-bottom:10px');
  ntitle2.innerHTML=`<div style="font-weight:800;font-size:14px;color:var(--text)">📰 News & Updates</div><span style="font-size:11px;color:var(--sub)">${allNews.length} items</span>`;
  body.appendChild(ntitle2);

  if(allNews.length===0){
    const emp=d('text-align:center;padding:40px 20px;background:var(--card2);border-radius:16px;border:1px dashed var(--border)');
    emp.innerHTML=`<div style="font-size:48px">📰</div><div style="font-weight:700;color:var(--text);margin-top:10px">Koi news nahi abhi</div><div style="font-size:12px;color:var(--sub);margin-top:5px">Admin updates dalega yahan dikhegi</div>`;
    body.appendChild(emp);
  } else {
    // Featured / latest news first — big card
    const latest=allNews[0];
    const TYPE_COL={general:'#6c63ff',exam:'#ff5252',result:'#00d68f',holiday:'#ffd43b',update:'#22d3ee',important:'#f472b6'};
    const bigCard=mk('div',{style:`background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:14px;cursor:pointer`});
    bigCard.innerHTML=`
    <div style="background:linear-gradient(135deg,${TYPE_COL[latest.category]||'#6c63ff'}44,${TYPE_COL[latest.category]||'#6c63ff'}11);padding:20px;position:relative">
      <div style="position:absolute;right:16px;top:16px;background:${TYPE_COL[latest.category]||'#6c63ff'}33;border:1px solid ${TYPE_COL[latest.category]||'#6c63ff'}55;border-radius:20px;padding:3px 11px;font-size:10px;font-weight:800;color:${TYPE_COL[latest.category]||'#6c63ff'}">${(latest.category||'general').toUpperCase()}</div>
      <div style="font-size:28px;margin-bottom:10px">${latest.emoji||'📰'}</div>
      <div style="font-weight:900;font-size:17px;color:var(--text);line-height:1.4;margin-bottom:6px">${latest.title}</div>
      <div style="font-size:12px;color:var(--sub)">📅 ${fdate(latest.date)} ${latest.author?`• ✍️ ${latest.author}`:''}</div>
    </div>
    ${latest.content?`<div style="padding:14px 16px;font-size:13px;color:var(--sub);line-height:1.7;border-top:1px solid var(--border)">${latest.content}</div>`:''}`;
    bigCard.onclick=()=>openNewsDetail(latest);
    body.appendChild(bigCard);

    // Rest of news as list cards
    if(allNews.length>1){
      const ll=d('display:flex;flex-direction:column;gap:9px');
      allNews.slice(1).forEach(news=>{
        const card=mk('div',{style:'background:var(--card);border:1px solid var(--border);border-radius:15px;padding:13px 14px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .2s'});
        card.innerHTML=`
        <div style="width:48px;height:48px;border-radius:14px;background:${TYPE_COL[news.category]||'#6c63ff'}22;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${news.emoji||'📰'}</div>
        <div style="flex:1;overflow:hidden">
          <div style="background:${TYPE_COL[news.category]||'#6c63ff'}22;border-radius:20px;padding:2px 9px;font-size:9px;font-weight:800;color:${TYPE_COL[news.category]||'#6c63ff'};display:inline-block;margin-bottom:5px">${(news.category||'general').toUpperCase()}</div>

          ${news.content?`<div style="font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${news.content}</div>`:''}

function buildExplore(){
  const w=mk('div',{class:'fadein',style:'padding-bottom:80px'});
  const hdr=mk('div',{class:'ghdr'});
  hdr.innerHTML=`<div style="font-weight:900;font-size:18px;color:#fff;margin-bottom:12px">🔍 Explore</div><div class="srch"><span class="si">🔍</span><input id="exp-s" value="${S.srq||''}" placeholder="Koi bhi topic dhundho..." style="font-family:inherit"></div>`;
  w.appendChild(hdr);

  const body=d('padding:12px 14px 0');

  // Type filter
  const tf=d('margin-bottom:12px');tf.innerHTML='<div style="font-weight:700;font-size:12px;color:var(--text);margin-bottom:7px">Type</div>';
  const tr=d('display:flex;gap:7px;overflow-x:auto;scrollbar-width:none');
  [['all','🔥 All'],['pdf','📄 PDF'],['video','🎬 Video'],['note','📝 Notes'],['book','📚 Book'],['pyq','📋 PYQ'],['quiz','❓ Test'],['image','🖼️ Image']].forEach(([t,l])=>{
    const b=mk('div',{class:'chip'+(S.srType===t?' on':'')});b.textContent=l;
    b.onclick=()=>{S.srType=t;rerender();};tr.appendChild(b);
  });
  tf.appendChild(tr); body.appendChild(tf);

  // Class filter
  const cf=d('margin-bottom:12px');cf.innerHTML='<div style="font-weight:700;font-size:12px;color:var(--text);margin-bottom:7px">Class</div>';
  const cr=d('display:flex;gap:7px;overflow-x:auto;scrollbar-width:none');
  [['all','All'],['9','9'],['10','10']].forEach(([v,l])=>{
    const b=mk('div',{class:'chip'+(S.srCls===v?' on':'')});b.textContent=`Class ${l}`;
    b.onclick=()=>{S.srCls=v;rerender();};cr.appendChild(b);
  });
  cf.appendChild(cr); body.appendChild(cf);

  const res=d('');res.id='exp-res';
  body.appendChild(res);
  w.appendChild(body);

  function rerender(){
    let mats=[...MATS];
    const q=(document.getElementById('exp-s')?.value||S.srq||'').toLowerCase();
    if(q) mats=mats.filter(m=>(m.title||'').toLowerCase().includes(q)||(m.subject||'').toLowerCase().includes(q)||(m.chapter||'').toLowerCase().includes(q)||(m.desc||'').toLowerCase().includes(q));
    if(S.srType&&S.srType!=='all') mats=mats.filter(m=>m.type===S.srType);
    if(S.srCls&&S.srCls!=='all') mats=mats.filter(m=>m.cls===S.srCls);

    const r=document.getElementById('exp-res'); if(!r) return;
    r.innerHTML='';
    const t=d('margin-bottom:8px');t.innerHTML=`<div style="font-weight:700;font-size:13px;color:var(--text)">${mats.length} results${q?` for "${q}"`:''}:</div>`;
    r.appendChild(t);
    if(mats.length===0){
      const e=d('text-align:center;padding:40px 20px;color:var(--sub)');e.innerHTML='<div style="font-size:40px">🔍</div><div style="font-weight:700;color:var(--text);margin-top:8px">Koi result nahi</div>';r.appendChild(e);
    } else {
      const ll=d('display:flex;flex-direction:column;gap:9px');
      mats.forEach(m=>ll.appendChild(matCard(m)));r.appendChild(ll);
    }
  }
  rerender();
  setTimeout(()=>{
    const si=document.getElementById('exp-s');
    if(si){ si.focus(); si.addEventListener('input',e=>{S.srq=e.target.value;rerender();}); }
  },100);
  return w;
}

function updateAdTabs(){

    if(lbl){ lbl.style.color=on?t.col:'rgba(255,255,255,.3)'; lbl.style.fontWeight=on?'800':'600'; }
  });
}

function rebuildAdBody(){
  const old=document.getElementById('ad-body'); if(!old) return;
  const nb=mk('div',{class:'ad-body',id:'ad-body'});

  const ca=document.querySelector('.ad-content'); if(ca) ca.scrollTop=0;
}

function adRender(body){
  switch(S.adTab){
    case 'dashboard': body.appendChild(adDash()); break;

    case 'add':       body.appendChild(adAddForm()); break;
    case 'chapters':  body.appendChild(adChapters()); break;

    case 'analytics': body.appendChild(adAnalytics()); break;

function adSubjects(){
  const w=mk('div');
  w.innerHTML='<div style="font-weight:900;font-size:15px;color:var(--text);margin-bottom:14px">📖 Subject Manager</div>';

  ['9','10'].forEach(cls=>{
    const sec=mk('div',{style:'background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px'});
    const subs=SUBJECTS_DATA[cls]||[];

    const title=mk('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px'});
    title.innerHTML=`<div style="font-weight:800;font-size:14px;color:var(--text)">Class ${cls} <span style="color:var(--sub);font-weight:600;font-size:12px">(${subs.length} subjects)</span></div>`;
    sec.appendChild(title);

    // Current subjects as chips
    const chips=mk('div',{style:'display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px'});
    subs.forEach((subj,i)=>{
      const chip=mk('div',{style:'display:flex;align-items:center;gap:5px;background:var(--acc)18;border:1px solid var(--acc)33;border-radius:20px;padding:5px 12px'});
      chip.innerHTML=`<span style="font-size:12px;font-weight:700;color:var(--acc)">${subj}</span>`;
      const del=mk('button',{style:'background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1;padding:0'});del.textContent='×';
      del.onclick=()=>{
        if(confirm(`"${subj}" delete karein? Is subject ke sab materials bhi hatenge.`)){
          SUBJECTS_DATA[cls]=SUBJECTS_DATA[cls].filter(s=>s!==subj);
          MATS=MATS.filter(m=>!(m.cls===cls&&m.subject===subj));
          save('ea_subjects',SUBJECTS_DATA); svMats();
          rebuildAdBody(); toast(`${subj} delete ho gaya!`);
        }
      };
      chip.appendChild(del); chips.appendChild(chip);
    });
    sec.appendChild(chips);

    // Add new subject
    const addRow=mk('div',{style:'display:flex;gap:7px'});
    const si=mk('input',{class:'inp',style:'flex:1;padding:9px 12px;font-size:13px',placeholder:`Naya subject naam (Class ${cls})...`});
    const addBtn=mk('button',{class:'btn btn-green btn-sm',style:'white-space:nowrap'});addBtn.textContent='＋ Add';
    addBtn.onclick=()=>{
      const v=si.value.trim();
      if(!v){toast('Subject naam daalo!','err');return;}
      if((SUBJECTS_DATA[cls]||[]).includes(v)){toast('Yeh subject already hai!','warn');return;}
      if(!SUBJECTS_DATA[cls])SUBJECTS_DATA[cls]=[];
      SUBJECTS_DATA[cls].push(v);
      save('ea_subjects',SUBJECTS_DATA);
      si.value=''; rebuildAdBody(); toast(`${v} Class ${cls} mein add ho gaya!`);
    };
    si.addEventListener('keydown',e=>{if(e.key==='Enter')addBtn.click();});
    addRow.append(si,addBtn); sec.appendChild(addRow);
    w.appendChild(sec);
  });
  return w;
}

// ─── CONTENT MANAGER ─────────────────────────────────────

      <div style="flex:1;overflow:hidden">
        <div style="font-weight:700;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px">${m.title}</div>
        <div style="font-size:11px;color:var(--sub);margin-bottom:5px">${m.chapter||'No chapter'} • ${fdate(m.date)}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span class="badge type-${m.type}">${ti.icon} ${ti.label}</span>
          <span style="font-size:10px;color:var(--sub)">👁 ${m.views||0}</span>
        </div>

    </div>
    <div style="display:flex;border-top:1px solid var(--border)">
      <button onclick="adEditMat('${m.id}')" style="flex:1;padding:9px;background:transparent;border:none;color:var(--acc);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border-right:1px solid var(--border)">✏️ Edit</button>

window.adEditMat=function(id){ S.adEditId=id; S.adTab='add'; S.adForm='edit'; rebuildAdBody(); updateAdTabs(); };

// ─── ADD / EDIT FORM ──────────────────────────────────────
function adAddForm(isEdit=false){
